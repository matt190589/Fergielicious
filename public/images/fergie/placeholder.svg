  <ellipse cx="200" cy="90" rx="90" ry="50" fill="#92400E"/>
  <rect x="110" y="90" width="180" height="60" fill="#92400E"/>
  <!-- Eyes -->
  <circle cx="165" cy="175" r="18" fill="white"/>
  <circle cx="235" cy="175" r="18" fill="white"/>
  <circle cx="170" cy="178" r="10" fill="#1E293B"/>
  <circle cx="240" cy="178" r="10" fill="#1E293B"/>
  <circle cx="173" cy="174" r="4" fill="white"/>
